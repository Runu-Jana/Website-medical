name: CI

on:
  push:
    branches: [main, 'claude/**']
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (tests + prisma)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: dcare
          POSTGRES_PASSWORD: dcare
          POSTGRES_DB: dcare
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: postgresql://dcare:dcare@localhost:5432/dcare?schema=public
      TEST_DATABASE_URL: postgresql://dcare:dcare@localhost:5432/dcare?schema=public
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - working-directory: backend
        run: npm ci
      - name: Prisma client generates & schema is valid
        working-directory: backend
        run: npx prisma generate && npx prisma validate
      - name: Sync schema to the test database
        working-directory: backend
        run: npx prisma db push --skip-generate
      - name: Tests (unit + integration)
        working-directory: backend
        run: npm test

  frontend:
    name: Storefront (build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - working-directory: frontend
        run: npm ci
      - working-directory: frontend
        run: npm run build

  admin:
    name: Admin (build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: admin/package-lock.json
      - working-directory: admin
        run: npm ci
      - working-directory: admin
        run: npm run build
