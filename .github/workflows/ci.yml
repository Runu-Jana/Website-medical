name: CI

on:
  push:
    branches: [main, 'claude/**']
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (tests + prisma)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - working-directory: backend
        run: npm ci
      - name: Prisma client generates & schema is valid
        working-directory: backend
        run: npx prisma generate && npx prisma validate
      - name: Unit tests
        working-directory: backend
        run: npm test

  frontend:
    name: Storefront (build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - working-directory: frontend
        run: npm ci
      - working-directory: frontend
        run: npm run build

  admin:
    name: Admin (build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: admin/package-lock.json
      - working-directory: admin
        run: npm ci
      - working-directory: admin
        run: npm run build
